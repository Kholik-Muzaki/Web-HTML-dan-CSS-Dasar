<html>
    <head>
        <title>
            ini adalah contoh dari inline, block, dan inline-block
        </title>
        <style>
            h1{
                display: block;
                background: yellow;
            }
           
            h2{
                display: inline;
            }
            .sosmed{
                display: inline-block;
            }
            a{
                height: 250px;
                width: 250px;
                background: green;
            }
        
        </style>
    </head>

    <body>
        <h1>
            hallo kawan-kawan, ini h1
        </h1>
        <h2>
            hallo kawan-kawan ini h2
        </h2>

        <a href="" class="sosmed">klik disini</a> untuk menuju ke facebook
        <a href="" class="sosmed">klik disini</a>untuk menuju instagram
    </body>
</html>
