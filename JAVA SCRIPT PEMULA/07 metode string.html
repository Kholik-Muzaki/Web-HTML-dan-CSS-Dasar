<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="wrap"></div>
    <div id="wrap2"></div>
    <div id="wrap3"></div>

    <script>
         var nama="kholik";
         var hasil= nama.charAt("4");

         var nama2= "kholik muzaki";
         var hasil2= nama2.toUpperCase();

         var nama3= "kholik muzaki oke";
         var hasil3= nama3.replace("oke","joss");

         document.getElementById("wrap").innerHTML= hasil;
         document.getElementById("wrap2").innerHTML= hasil2;
         document.getElementById("wrap3").innerHTML= hasil3;
    </script>
</body>
</html>
