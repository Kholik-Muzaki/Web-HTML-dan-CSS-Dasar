<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="wrap"></div>
    <div id="wrap2"></div>
    <div id="wrap3"></div>
    <script>
        var angka= 1000;
        var angka2= 1000;

        var jumlah= angka + angka2;

        var x= 1000;
        var y= 1000;

        var z= x + y;
        z++;

        var a= 10;
        var b= 20;

        //a= a + b;
        a += b;

        document.getElementById("wrap").innerHTML= jumlah;
        document.getElementById("wrap2").innerHTML= z;
        document.getElementById("wrap3").innerHTML= a;
    </script>
</body>
</html>
