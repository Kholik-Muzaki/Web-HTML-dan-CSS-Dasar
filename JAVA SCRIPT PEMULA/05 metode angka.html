<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="wrap"></div>
    <div id="wrap2"></div>
    <div id="wrap3"></div>

    <script>
        var a= 5;
        var b= 5.555555555;

        var c= a + b;
        var d= b.toFixed(2);
        var e= Math.random();

        document.getElementById("wrap").innerHTML= c;
        document.getElementById("wrap2").innerHTML= d;
        document.getElementById("wrap3").innerHTML= e;
    </script>
</body>
</html>
