<html>
	<head>
		<title>checkbox dan radio</title>
	</head>
	<body>
	<h2>ini adalah contoh dari checkbox</h2>
	<br>
	pilihlah hobi anda dibawah ini<br>
	<input type="checkbox" name="hobi" value="0">menggambar<br>
	<input type="checkbox" name="hobi" value="1">menulis<br>
	<input type="checkbox" name="hobi" value="3">mengarang<br>
	<input type="checkbox" name="hobi" value="4">lainnya<br>
	
	<h2>ini adalah contoh dari radio</h2><br>
	<input type="radio" name="gender" value="0">laki-laki<br>
	<input type="radio" name="gender" value="1" checked>perempuan<br>
	</body>
</html>
