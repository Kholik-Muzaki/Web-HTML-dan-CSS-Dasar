<html>
    <head>
        <title> ini contoh border radius </title>
        <style>
            #box{
                width: 100px;
                height: 100px;
                background-color: aqua;
                border-radius: 25px;
            }

            #box2{
                width: 100px;
                height: 100px;
                background-color: blue;
                border-radius: 50%;
                margin-top: 5px;
            }

            #box3{
                width: 100px;
                height: 100px;
                background-color:chartreuse;
                box-shadow: 15px 10px 5px 5px black;
                margin-top: 5px;
            }

            #box4{
                width: 100px;
                height: 100px;
                background-color: blue;
                padding: 5px;
                border: 5px solid black;
                box-sizing: border-box;

                /*ini adalah vendor prefix*/
                -webkit-box-sizing: border-box;
                -moz-box-sizing: border-box;
                -o-box-sizing: border-box;
                -ms-box-sizing: border-box;

            }

            #box5{
                width: 100px;
                height: 100px;
                background-color: red;
            }
        </style>
    </head>

    <body>
        <div id="box">
            
        </div>

        <div id="box2">

        </div>

        <h2> BOX SHADOW </h2>
        <div id="box3">

        </div>

        <h2> BOX SIZING </h2>
        <div id="box4">
    
        </div>

        <div id="box5">

        </div>
    </body>
</html>
