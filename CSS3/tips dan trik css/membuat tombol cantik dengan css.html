<html>
    <head>
        <title>membuat tombol cantik dengan css</title>
        <style>
            body{
                margin: 15% 15%;
                font-family: sans-serif;
            }
            .button{
                text-decoration: none;
                color: white;
                display: block;
                width: 200px;
                padding: 5px 10px;
                text-align: center;
                margin: 10px;
                border-radius: 10px;
            }
            .no-1{
                background-color: rgb(50, 92, 184);
            }
            .no-2{
                background-color: rgb(134, 31, 39);
            }
            .no-3{
                background-color: rgb(127, 165, 37);
            }
        </style>
    </head>
    <body>
        <h1>trik dan trip css</h1>
        <a href="#" class="button no-1">Berhasil</a>
        <a href="#" class="button no-2">Berbahaya</a>
        <a href="#" class="button no-3">Hati-Hati</a>
    </body>
</html>
